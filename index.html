<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Nokia Sales Workbench — Demo</title>
<style>
:root{
  --c-bg:#EEF1F6;
  --c-white:#FFFFFF;
  --c-soft:#F1F4F9;
  --c-soft2:#F6F8FB;
  --c-border:#D8E0EC;
  --c-border2:#C9D4E3;
  --c-text:#1a1a1a;
  --c-muted:#6b7480;
  --c-muted2:#9CA3AF;

  --c-blue:#185FA5;
  --c-blue-d:#0C447C;
  --c-blue-l:#E6F1FB;
  --c-navy:#124191;
  --c-navy-d:#001F5F;

  --c-gold:#BA7517;
  --c-gold-bg:#FAEEDA;
  --c-gold-t:#854F0B;
  --c-teal:#1D7777;
  --c-teal-bg:#DAEEEC;
  --c-teal-t:#1D5757;
  --c-green:#3B6D11;
  --c-green-bg:#EAF3DE;
  --c-red:#A32D2D;
  --c-red-bg:#FCEBEB;
  --c-purple:#534AB7;
  --c-purple-bg:#EEEDFE;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
  background:var(--c-bg);
  color:var(--c-text);
  font-size:14px;
  line-height:1.5;
  overflow:hidden;
}
button{font-family:inherit;border:0.5px solid var(--c-border2);background:#fff;color:var(--c-text);border-radius:6px;cursor:pointer;transition:background .15s;font-size:12px;padding:6px 12px;}
button:hover{background:var(--c-soft);}
button.primary{background:var(--c-blue);color:#fff;border-color:var(--c-blue);}
button.primary:hover{background:var(--c-blue-d);}
input,select,textarea{font-family:inherit;border:0.5px solid var(--c-border2);background:#fff;border-radius:6px;outline:none;padding:6px 12px;font-size:13px;color:var(--c-text);}
input:focus,select:focus,textarea:focus{border-color:var(--c-blue);box-shadow:0 0 0 2px rgba(24,95,165,.15);}

/* ───── SHELL ───── */
.app{display:flex;height:100vh;}
.sidebar{
  width:240px;flex-shrink:0;
  background:var(--c-navy);
  color:#fff;
  display:flex;flex-direction:column;
  border-right:1px solid #0a1a44;
}
.sb-brand{padding:22px 20px 20px;border-bottom:1px solid #1d3a7a;}
.sb-brand-mark{
  display:inline-flex;align-items:center;justify-content:center;
  width:34px;height:34px;border-radius:6px;background:#fff;color:var(--c-navy);
  font-weight:600;font-size:16px;margin-bottom:10px;letter-spacing:-0.5px;
}
.sb-title{font-size:15px;font-weight:500;letter-spacing:-0.2px;line-height:1.2;}
.sb-title span{color:#A4BCE0;font-weight:400;}
.sb-sub{font-size:10px;color:#A4BCE0;margin-top:3px;letter-spacing:1.5px;text-transform:uppercase;}

.sb-section{padding:18px 14px 6px;font-size:9.5px;color:#7C9BD2;font-weight:600;letter-spacing:1.6px;text-transform:uppercase;}

.sb-nav{padding:0 8px;display:flex;flex-direction:column;gap:2px;flex:1;overflow-y:auto;}
.sb-item{
  display:flex;align-items:center;gap:11px;
  padding:10px 12px;
  border-radius:6px;
  cursor:pointer;
  transition:background .15s;
  color:#D6E0F2;
  font-size:13px;font-weight:400;
  border:none;background:none;width:100%;text-align:left;
}
.sb-item:hover{background:rgba(255,255,255,0.07);color:#fff;}
.sb-item.active{background:#fff;color:var(--c-navy);font-weight:500;}
.sb-item.active .sb-ico{color:var(--c-navy);}
.sb-ico{width:18px;height:18px;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;color:#7C9BD2;}
.sb-item.active .sb-ico,.sb-item:hover .sb-ico{color:#fff;}
.sb-item.active:hover .sb-ico{color:var(--c-navy);}
.sb-meta{font-size:10px;color:#7C9BD2;margin-left:auto;letter-spacing:0.5px;}
.sb-item.active .sb-meta{color:var(--c-blue);}

.sb-foot{padding:14px 20px;border-top:1px solid #1d3a7a;font-size:10px;color:#7C9BD2;line-height:1.6;}
.sb-foot strong{color:#A4BCE0;font-weight:500;}

/* ───── MAIN CONTENT AREA ───── */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;background:var(--c-bg);}
.topbar{
  height:48px;flex-shrink:0;
  background:#fff;
  border-bottom:0.5px solid var(--c-border);
  display:flex;align-items:center;
  padding:0 20px;gap:14px;
}
.tb-crumb{font-size:12px;color:var(--c-muted);}
.tb-crumb strong{color:var(--c-text);font-weight:500;}
.tb-meta{margin-left:auto;display:flex;align-items:center;gap:14px;font-size:11px;color:var(--c-muted);}
.live-dot{width:6px;height:6px;border-radius:50%;background:#639922;display:inline-block;margin-right:5px;}
.tb-user{display:flex;align-items:center;gap:8px;padding:4px 10px;border-radius:6px;border:0.5px solid var(--c-border);background:#fff;font-size:11px;}
.tb-user-avatar{width:22px;height:22px;border-radius:50%;background:var(--c-blue);color:#fff;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:500;}

.view{flex:1;overflow-y:auto;}
.view-inner{max-width:1500px;margin:0 auto;padding:24px;}

/* ───── HOME ───── */
.home-hero{
  background:linear-gradient(135deg,var(--c-navy) 0%,var(--c-blue-d) 60%,var(--c-blue) 100%);
  border-radius:14px;
  padding:24px 32px;
  color:#fff;
  margin-bottom:22px;
  position:relative;overflow:hidden;
}
.home-hero::after{
  content:"";position:absolute;top:0;right:0;bottom:0;width:60%;
  background:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 600 240'><g stroke='%23ffffff' stroke-width='1' fill='none' opacity='0.12'><line x1='400' y1='10' x2='600' y2='220'/><line x1='420' y1='10' x2='600' y2='200'/><line x1='440' y1='10' x2='600' y2='180'/><line x1='460' y1='10' x2='600' y2='160'/><line x1='480' y1='10' x2='600' y2='140'/></g></svg>") no-repeat right center;
  background-size:contain;
}
.home-hero-tag{font-size:11px;letter-spacing:2px;color:#A4BCE0;text-transform:uppercase;margin-bottom:8px;}
.home-hero-title{font-size:24px;font-weight:500;letter-spacing:-0.5px;margin-bottom:5px;line-height:1.1;}
.home-hero-sub{font-size:13px;color:#D6E0F2;line-height:1.5;}
.home-hero-meta{display:flex;gap:28px;margin-top:22px;}
.hhm{font-size:11px;color:#A4BCE0;letter-spacing:0.8px;text-transform:uppercase;margin-bottom:3px;}
.hhv{font-size:18px;font-weight:500;letter-spacing:-0.3px;}

.home-section-title{font-size:11px;letter-spacing:2px;color:var(--c-muted);text-transform:uppercase;margin:0 4px 12px;font-weight:600;}

.tools-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px;margin-bottom:22px;}
.tool-card{
  background:#fff;
  border:0.5px solid var(--c-border);
  border-radius:14px;
  padding:24px;
  cursor:pointer;
  transition:all .2s;
  position:relative;
  display:flex;flex-direction:column;
  min-height:200px;
}
.tool-card:hover{border-color:var(--c-blue);box-shadow:0 4px 16px rgba(18,65,145,.08);transform:translateY(-1px);}
.tc-head{display:flex;align-items:start;justify-content:space-between;margin-bottom:8px;}
.tc-icon{
  width:42px;height:42px;border-radius:9px;
  display:flex;align-items:center;justify-content:center;
  font-size:18px;color:#fff;font-weight:500;
}
.tc-tag{font-size:10px;padding:3px 8px;background:var(--c-blue-l);color:var(--c-blue);border-radius:11px;font-weight:500;letter-spacing:0.5px;}
.tc-name{font-size:18px;font-weight:500;letter-spacing:-0.3px;margin-top:4px;}
.tc-name span{color:var(--c-blue);font-weight:400;}
.tc-tagline{font-size:12px;color:var(--c-muted);margin-top:4px;}
.tc-desc{font-size:12.5px;color:var(--c-text);margin-top:12px;line-height:1.55;flex:1;}
.tc-foot{display:flex;align-items:center;justify-content:space-between;margin-top:14px;padding-top:12px;border-top:0.5px solid var(--c-border);font-size:11px;color:var(--c-muted);}
.tc-cta{color:var(--c-blue);font-weight:500;font-size:12px;display:flex;align-items:center;gap:4px;}

.programme-strip{
  background:#fff;
  border:0.5px solid var(--c-border);
  border-radius:14px;
  padding:18px 22px;
  display:grid;grid-template-columns:repeat(4,1fr);gap:24px;
}
.ps-item{}
.ps-label{font-size:10px;color:var(--c-muted);letter-spacing:0.8px;text-transform:uppercase;margin-bottom:5px;}
.ps-val{font-size:14px;font-weight:500;color:var(--c-text);}
.ps-sub{font-size:11px;color:var(--c-muted);margin-top:2px;}

/* ───── ONE GLANCE ───── */
.og-wrap{}
.og-hdr{
  background:#fff;border:0.5px solid var(--c-border);border-radius:14px 14px 0 0;
  padding:14px 20px;border-bottom:0;display:flex;align-items:center;justify-content:space-between;
}
.og-search{padding:6px 12px;width:240px;font-size:12px;}
.og-cust-strip{
  background:#fff;border:0.5px solid var(--c-border);border-top:0;border-bottom:0;
  padding:18px 20px;display:grid;grid-template-columns:auto 1fr auto auto;gap:24px;align-items:center;
}
.og-flag{width:54px;height:54px;border-radius:10px;background:linear-gradient(135deg,#000 0%,#000 33%,#DD0000 33%,#DD0000 66%,#FFCC00 66%,#FFCC00 100%);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:600;font-size:14px;letter-spacing:1px;text-shadow:0 1px 2px rgba(0,0,0,0.5);}
.og-flag.fr{background:linear-gradient(90deg,#0055A4 0%,#0055A4 33%,#FFFFFF 33%,#FFFFFF 66%,#EF4135 66%,#EF4135 100%);color:#0055A4;text-shadow:0 0 2px rgba(255,255,255,0.9);}
.og-cname{font-size:22px;font-weight:500;letter-spacing:-0.4px;margin-bottom:2px;}
.og-cmeta{font-size:12px;color:var(--c-muted);display:flex;gap:10px;flex-wrap:wrap;align-items:center;}
.og-chip{font-size:9.5px;padding:2px 7px;background:var(--c-blue-l);color:var(--c-blue);border-radius:3px;font-weight:500;letter-spacing:0.4px;}
.og-stat-block{}
.og-sl{font-size:9.5px;color:var(--c-muted);letter-spacing:0.8px;text-transform:uppercase;margin-bottom:3px;}
.og-sv{font-size:18px;font-weight:500;letter-spacing:-0.3px;}
.og-sv-up{font-size:11px;color:var(--c-green);margin-top:1px;}

.og-actions{display:flex;flex-direction:column;gap:5px;}

.og-cards{
  background:var(--c-soft2);border:0.5px solid var(--c-border);border-top:0;border-radius:0 0 14px 14px;
  padding:14px;
}
.og-row{display:grid;gap:12px;margin-bottom:12px;}
.og-row.cols-3{grid-template-columns:repeat(3,1fr);}
.og-row.cols-2{grid-template-columns:1fr 1fr;}
.og-row.cols-2-thin-thick{grid-template-columns:1fr 1.6fr;}
.og-card{background:#fff;border:0.5px solid var(--c-border);border-radius:10px;padding:13px 15px;}
.og-cb{border-top:2px solid var(--c-blue);}
.og-cg{border-top:2px solid var(--c-gold);}
.og-cgr{border-top:2px solid var(--c-green);}
.og-cp{border-top:2px solid var(--c-purple);}
.og-cr{border-top:2px solid var(--c-red);}
.og-ct{font-size:9.5px;font-weight:500;color:var(--c-muted);text-transform:uppercase;letter-spacing:0.9px;margin-bottom:9px;display:flex;align-items:center;justify-content:space-between;}
.og-mr{display:flex;align-items:baseline;justify-content:space-between;padding:6px 0;border-bottom:0.5px dashed #E3E8F0;}
.og-mr:last-child{border:none;padding-bottom:0;}
.og-mr:first-child{padding-top:0;}
.og-ml{font-size:11px;color:var(--c-muted);}
.og-mv{font-size:13px;font-weight:500;}
.og-ms{font-size:10px;color:var(--c-muted);}

.exec-row{display:grid;grid-template-columns:auto 1fr;gap:10px;padding:7px 0;border-bottom:0.5px dashed #E3E8F0;align-items:center;}
.exec-row:last-child{border:none;}
.exec-av{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:500;}
.exec-name{font-size:12.5px;font-weight:500;}
.exec-role{font-size:10px;color:var(--c-blue);letter-spacing:0.6px;text-transform:uppercase;margin-bottom:2px;}
.exec-note{font-size:10.5px;color:var(--c-muted);line-height:1.4;}

.donut-wrap{display:flex;flex-direction:column;align-items:center;padding:6px 0 4px;}
.donut{width:120px;height:120px;}
.donut-c{font-size:9px;font-weight:500;fill:var(--c-blue);}
.donut-l{font-size:3px;fill:var(--c-muted);text-anchor:middle;letter-spacing:0.5px;}
.split-bar{display:flex;height:6px;border-radius:3px;overflow:hidden;margin-top:10px;width:100%;}
.split-leg{display:flex;flex-wrap:wrap;gap:8px;font-size:9.5px;color:var(--c-muted);margin-top:7px;justify-content:center;}
.split-leg span{display:inline-flex;align-items:center;gap:4px;}
.split-dot{width:7px;height:7px;border-radius:50%;display:inline-block;}

.compete{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:4px;}
.compete-item{padding:8px 10px;background:var(--c-soft);border-radius:5px;}
.compete-l{font-size:9px;color:var(--c-muted);letter-spacing:0.4px;text-transform:uppercase;margin-bottom:3px;}
.compete-v{font-size:11px;font-weight:500;}
.compete-v.warn{color:var(--c-gold-t);}
.compete-v.ok{color:var(--c-blue);}

.ap-row{display:grid;grid-template-columns:auto 1fr;gap:8px;padding:6px 0;align-items:start;}
.ap-tag{font-size:8.5px;font-weight:600;padding:2px 6px;border-radius:3px;letter-spacing:0.4px;flex-shrink:0;margin-top:1px;}
.ap-win{background:var(--c-green-bg);color:var(--c-green);}
.ap-risk{background:var(--c-gold-bg);color:var(--c-gold-t);}
.ap-text{font-size:11.5px;line-height:1.4;}

.funnel{display:flex;flex-direction:column;gap:3px;align-items:center;padding:6px 0;}
.funnel-stage{height:14px;border-radius:2px;display:flex;align-items:center;justify-content:center;font-size:9.5px;color:#fff;font-weight:500;}

.deal-row{display:flex;justify-content:space-between;padding:5px 0;border-bottom:0.5px dashed #E3E8F0;font-size:11.5px;}
.deal-row:last-child{border:none;}

/* ───── SAGE ───── */
.sage-wrap{display:grid;grid-template-columns:240px 1fr;gap:14px;height:100%;}
.sage-side{
  background:#fff;border:0.5px solid var(--c-border);border-radius:12px;
  padding:14px;display:flex;flex-direction:column;gap:14px;
  height:fit-content;
}
.sage-side h4{font-size:9.5px;color:var(--c-muted);letter-spacing:1.4px;text-transform:uppercase;font-weight:600;}
.sage-persona{font-size:12px;}
.sage-persona-row{display:flex;justify-content:space-between;padding:5px 0;border-bottom:0.5px dashed #E3E8F0;}
.sage-persona-row:last-child{border:none;}
.sage-persona-row .l{color:var(--c-muted);}
.sage-persona-row .v{font-weight:500;}
.sage-suggest{display:flex;flex-direction:column;gap:6px;}
.sage-sg-item{
  font-size:11.5px;padding:8px 10px;border-radius:6px;background:var(--c-soft);
  cursor:pointer;border:0.5px solid transparent;line-height:1.4;
}
.sage-sg-item:hover{background:var(--c-blue-l);border-color:var(--c-blue);color:var(--c-blue);}

.sage-corpus-list{font-size:11px;color:var(--c-muted);}
.sage-corpus-list li{padding:3px 0;list-style:none;display:flex;align-items:center;gap:6px;}
.sage-corpus-list li::before{content:"•";color:var(--c-blue);}

.sage-chat-wrap{
  display:flex;flex-direction:column;
  background:#fff;border:0.5px solid var(--c-border);border-radius:12px;
  height:calc(100vh - 130px);
}
.sage-chat-hdr{padding:14px 20px;border-bottom:0.5px solid var(--c-border);display:flex;align-items:center;justify-content:space-between;}
.sage-chat-title{font-size:14px;font-weight:500;}
.sage-chat-title small{font-size:11px;color:var(--c-muted);font-weight:400;margin-left:8px;}
.sage-status{font-size:10.5px;color:var(--c-muted);display:flex;align-items:center;gap:6px;}

.sage-chat-body{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:18px;}

.sage-msg-user{align-self:flex-end;max-width:75%;}
.sage-msg-user .bubble{background:var(--c-blue);color:#fff;padding:10px 14px;border-radius:12px 12px 4px 12px;font-size:13px;line-height:1.45;}
.sage-msg-user .bubble-meta{font-size:10px;color:var(--c-muted);text-align:right;margin-top:4px;}

.sage-msg-bot{align-self:stretch;max-width:90%;}
.sage-msg-bot-head{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.sage-bot-av{width:24px;height:24px;border-radius:50%;background:var(--c-blue);color:#fff;font-size:10px;font-weight:600;display:flex;align-items:center;justify-content:center;}
.sage-bot-name{font-size:12px;font-weight:500;}
.sage-bot-tag{font-size:9px;padding:2px 7px;background:var(--c-green-bg);color:var(--c-green);border-radius:11px;font-weight:600;letter-spacing:0.5px;}
.sage-bot-tag.warn{background:var(--c-gold-bg);color:var(--c-gold-t);}

.sage-bot-card{background:#fff;border:0.5px solid var(--c-border);border-radius:10px;padding:12px 14px;border-top:2px solid var(--c-blue);}
.sage-bot-text{font-size:13px;line-height:1.6;color:var(--c-text);}
.sage-bot-text strong{color:var(--c-blue);font-weight:500;}
.sage-bot-text ul{margin:6px 0 6px 18px;}
.sage-bot-text li{margin:3px 0;}

.sage-citations{margin-top:10px;padding-top:10px;border-top:0.5px dashed #E3E8F0;}
.sage-cit-label{font-size:9px;font-weight:600;color:var(--c-muted);letter-spacing:0.8px;margin-bottom:6px;}
.sage-cit-list{display:flex;flex-wrap:wrap;gap:5px;}
.sage-cit{font-size:10.5px;padding:3px 9px;background:var(--c-soft);border:0.5px solid var(--c-border);border-radius:11px;color:var(--c-blue);cursor:pointer;}
.sage-cit:hover{background:var(--c-blue-l);}

.sage-bot-actions{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap;}
.sage-bot-actions button{font-size:11px;padding:5px 10px;}

.sage-collateral{margin-top:10px;background:var(--c-soft2);border:0.5px solid var(--c-border);border-radius:8px;padding:13px;}
.sage-coll-head{font-size:9.5px;font-weight:600;color:var(--c-purple);letter-spacing:0.9px;margin-bottom:6px;}
.sage-coll-title{font-size:13px;font-weight:500;margin-bottom:5px;}
.sage-coll-body{font-size:11.5px;line-height:1.55;color:var(--c-text);}
.sage-coll-foot{font-size:10px;color:var(--c-muted);font-style:italic;margin-top:8px;}

.sage-typing{display:inline-flex;gap:3px;padding:6px 10px;background:var(--c-soft);border-radius:12px;align-items:center;}
.sage-typing .dot{width:5px;height:5px;background:var(--c-muted);border-radius:50%;animation:bounce 1.4s infinite;}
.sage-typing .dot:nth-child(2){animation-delay:0.2s;}
.sage-typing .dot:nth-child(3){animation-delay:0.4s;}
@keyframes bounce{0%,60%,100%{transform:translateY(0);opacity:0.6;}30%{transform:translateY(-3px);opacity:1;}}

.sage-input-area{
  border-top:0.5px solid var(--c-border);padding:12px 16px;display:flex;gap:8px;align-items:flex-end;
}
.sage-input{flex:1;border:0.5px solid var(--c-border2);border-radius:10px;padding:10px 12px;font-size:13px;resize:none;font-family:inherit;min-height:40px;max-height:120px;}
.sage-send{padding:9px 16px;font-size:13px;}

/* ───── VBAL ───── */
.vbal-wrap{}
.vbal-hero{
  background:#fff;border:0.5px solid var(--c-border);border-radius:14px;
  padding:24px 28px;margin-bottom:16px;
}
.vbal-hero-tag{font-size:10px;letter-spacing:2px;color:var(--c-muted);text-transform:uppercase;font-weight:600;margin-bottom:6px;}
.vbal-hero-title{font-size:22px;font-weight:500;letter-spacing:-0.4px;}
.vbal-hero-title span{color:var(--c-blue);}
.vbal-hero-sub{font-size:13px;color:var(--c-muted);margin-top:6px;max-width:760px;line-height:1.5;}

.vbal-stages{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-top:18px;}
.vbal-stage{
  padding:10px 12px;border:0.5px solid var(--c-border);border-radius:8px;
  background:var(--c-soft2);text-align:center;font-size:11px;color:var(--c-muted);
  position:relative;transition:all .25s;
}
.vbal-stage.active{background:var(--c-blue);color:#fff;border-color:var(--c-blue);}
.vbal-stage.done{background:var(--c-green-bg);color:var(--c-green);border-color:var(--c-green);}
.vbal-stage .num{display:inline-block;font-size:10px;width:18px;height:18px;border-radius:50%;background:#fff;color:var(--c-muted);line-height:18px;margin-bottom:4px;font-weight:600;}
.vbal-stage.active .num{background:#fff;color:var(--c-blue);}
.vbal-stage.done .num{background:var(--c-green);color:#fff;}

.vbal-card{background:#fff;border:0.5px solid var(--c-border);border-radius:14px;padding:22px 26px;margin-bottom:14px;}
.vbal-card-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;padding-bottom:10px;border-bottom:0.5px solid var(--c-border);}
.vbal-card-title{font-size:14px;font-weight:500;display:flex;align-items:center;gap:8px;}
.vbal-card-title .step-num{display:inline-block;width:22px;height:22px;border-radius:50%;background:var(--c-blue);color:#fff;font-size:11px;font-weight:600;text-align:center;line-height:22px;}
.vbal-card-sub{font-size:12px;color:var(--c-muted);}

.vbal-form-row{display:flex;gap:10px;align-items:end;margin-bottom:10px;flex-wrap:wrap;}
.vbal-field{display:flex;flex-direction:column;gap:5px;}
.vbal-field label{font-size:10px;color:var(--c-muted);letter-spacing:0.8px;text-transform:uppercase;font-weight:600;}
.vbal-field input,.vbal-field select{min-width:200px;}
.vbal-hint{font-size:11px;color:var(--c-muted);font-style:italic;margin-top:4px;}

.vbal-cust-card{
  background:linear-gradient(135deg,var(--c-soft2),#fff);
  border:1px solid var(--c-blue);border-left-width:4px;
  border-radius:8px;padding:14px 18px;margin-top:14px;
  display:none;
}
.vbal-cust-card.show{display:block;animation:slideIn .3s;}
@keyframes slideIn{from{opacity:0;transform:translateY(-6px);}to{opacity:1;transform:translateY(0);}}

.vbal-cust-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:18px;}
.vbal-cust-item .l{font-size:9.5px;color:var(--c-muted);letter-spacing:0.8px;text-transform:uppercase;margin-bottom:3px;}
.vbal-cust-item .v{font-size:14px;font-weight:500;}
.vbal-cust-item .pill-large{display:inline-block;padding:3px 10px;border-radius:11px;font-size:10px;font-weight:600;background:var(--c-blue);color:#fff;letter-spacing:0.5px;}
.vbal-cust-item .pill-longtail{display:inline-block;padding:3px 10px;border-radius:11px;font-size:10px;font-weight:600;background:var(--c-gold);color:#fff;letter-spacing:0.5px;}

.vbal-upload{
  border:1.5px dashed var(--c-border2);border-radius:10px;padding:24px;text-align:center;
  background:var(--c-soft2);cursor:pointer;transition:all .2s;
}
.vbal-upload:hover{border-color:var(--c-blue);background:var(--c-blue-l);}
.vbal-upload.uploaded{border-color:var(--c-green);background:var(--c-green-bg);}
.vbal-upload-icon{font-size:24px;color:var(--c-blue);margin-bottom:6px;}
.vbal-upload-text{font-size:13px;color:var(--c-text);font-weight:500;}
.vbal-upload-sub{font-size:11px;color:var(--c-muted);margin-top:3px;}
.vbal-doc-list{margin-top:10px;display:flex;flex-direction:column;gap:5px;}
.vbal-doc-item{
  display:flex;align-items:center;gap:8px;padding:7px 10px;
  background:#fff;border:0.5px solid var(--c-border);border-radius:6px;font-size:11.5px;
}
.vbal-doc-item .ico{color:var(--c-red);font-weight:600;}

.vbal-collateral-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
.vbal-coll-item{
  display:flex;align-items:center;gap:8px;padding:10px 12px;
  background:var(--c-soft2);border:0.5px solid var(--c-border);border-radius:7px;
  cursor:pointer;font-size:12px;transition:all .15s;
}
.vbal-coll-item:hover{border-color:var(--c-blue);}
.vbal-coll-item input{margin:0;}
.vbal-coll-item.active{background:var(--c-blue-l);border-color:var(--c-blue);}
.vbal-coll-info{font-size:10px;color:var(--c-muted);margin-left:auto;}

.vbal-line-wrap{
  background:linear-gradient(135deg,var(--c-navy) 0%,var(--c-blue-d) 100%);
  border-radius:14px;padding:28px;color:#fff;margin-bottom:14px;
  position:relative;overflow:hidden;
}
.vbal-line-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;}
.vbal-line-title{font-size:15px;font-weight:500;}
.vbal-line-status{font-size:11px;color:#A4BCE0;}
.vbal-line-status .live-dot{background:#5DD675;}

.vbal-pipeline{display:grid;grid-template-columns:auto repeat(5, minmax(0,1fr)) auto;gap:0;align-items:stretch;position:relative;}
.vbal-stop{
  background:rgba(255,255,255,0.08);
  border:1px solid rgba(255,255,255,0.15);
  border-radius:9px;padding:14px 10px;text-align:center;
  transition:all .35s ease;
  position:relative;
  display:flex;flex-direction:column;justify-content:space-between;min-height:130px;
}
.vbal-stop.processing{background:rgba(255,255,255,0.15);border-color:#5DAFFF;box-shadow:0 0 0 2px rgba(93,175,255,0.2);}
.vbal-stop.done{background:rgba(46,160,67,0.18);border-color:#5DD675;}
.vbal-stop.endpoint{background:rgba(255,255,255,0.04);border-style:dashed;}
.vbal-stop-name{font-size:12px;font-weight:600;letter-spacing:-0.1px;}
.vbal-stop-sub{font-size:9.5px;color:#A4BCE0;margin-top:2px;}
.vbal-stop-tool{font-size:9.5px;color:#5DAFFF;letter-spacing:0.5px;font-weight:500;margin-top:6px;text-transform:uppercase;}
.vbal-stop-state{font-size:10px;margin-top:auto;padding-top:6px;color:#A4BCE0;display:flex;justify-content:center;gap:5px;align-items:center;}
.vbal-stop.processing .vbal-stop-state{color:#5DAFFF;font-weight:500;}
.vbal-stop.done .vbal-stop-state{color:#5DD675;font-weight:500;}

.vbal-spinner{width:11px;height:11px;border:2px solid rgba(93,175,255,0.3);border-top-color:#5DAFFF;border-radius:50%;animation:spin 0.9s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.vbal-check{color:#5DD675;font-weight:bold;}

.vbal-arrow{
  align-self:center;color:rgba(255,255,255,0.3);font-size:14px;padding:0 4px;
  transition:color .3s;
}
.vbal-arrow.active{color:#5DAFFF;}
.vbal-arrow.done{color:#5DD675;}

.vbal-progress-bar{height:4px;background:rgba(255,255,255,0.1);border-radius:2px;margin-top:18px;overflow:hidden;}
.vbal-progress-fill{height:100%;background:linear-gradient(90deg,#5DAFFF,#5DD675);width:0%;transition:width .35s ease;}

.vbal-outputs{margin-top:18px;display:grid;grid-template-columns:repeat(2,1fr);gap:10px;}
.vbal-output-item{
  background:rgba(255,255,255,0.06);border:0.5px solid rgba(255,255,255,0.15);border-radius:8px;
  padding:10px 14px;display:flex;align-items:center;gap:10px;
  opacity:0;transform:translateY(8px);transition:all .35s ease;
}
.vbal-output-item.show{opacity:1;transform:translateY(0);}
.vbal-output-item .file-ico{
  width:28px;height:28px;border-radius:5px;background:#fff;color:var(--c-blue);
  display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;flex-shrink:0;
}
.vbal-output-item .out-name{font-size:12px;font-weight:500;}
.vbal-output-item .out-sub{font-size:10px;color:#A4BCE0;}
.vbal-output-item .out-link{margin-left:auto;color:#5DAFFF;font-size:11px;text-decoration:none;cursor:pointer;}
.vbal-output-item .out-link:hover{text-decoration:underline;}

.vbal-final{background:#fff;border:1px solid var(--c-green);border-radius:12px;padding:18px 22px;display:none;align-items:center;justify-content:space-between;}
.vbal-final.show{display:flex;}
.vbal-final-icon{width:36px;height:36px;background:var(--c-green);color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:600;font-size:16px;margin-right:14px;}
.vbal-final-title{font-size:14px;font-weight:500;}
.vbal-final-sub{font-size:11.5px;color:var(--c-muted);}

.vbal-mode-badge{display:inline-block;padding:3px 10px;border-radius:11px;font-size:10px;font-weight:600;letter-spacing:0.6px;margin-left:10px;vertical-align:middle;}
.vbal-mode-large{background:var(--c-blue-l);color:var(--c-blue);}
.vbal-mode-longtail{background:var(--c-gold-bg);color:var(--c-gold-t);}

/* ───── ReNew (mostly reused) ───── */
/* Hero / KPIs / Toolbar / Table  + customer detail */
.l-hero{padding:18px 22px;background:#fff;border:0.5px solid var(--c-border);border-radius:14px 14px 0 0;border-bottom:0;}
.l-title{font-size:18px;font-weight:500;letter-spacing:-0.3px;}
.l-sub{font-size:12px;color:var(--c-muted);margin-top:3px;}
.l-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;padding:14px 22px;background:#fff;border-left:0.5px solid var(--c-border);border-right:0.5px solid var(--c-border);}
.lstat{padding:13px 15px;border:0.5px solid var(--c-border);border-radius:10px;border-top:2px solid var(--c-blue);}
.lstat.gold{border-top-color:var(--c-gold);}
.lstat.teal{border-top-color:var(--c-teal);}
.lstat-label{font-size:10px;color:var(--c-muted);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:6px;}
.lstat-val{font-size:20px;font-weight:500;letter-spacing:-0.3px;line-height:1;}
.lstat-sub{font-size:11px;color:var(--c-muted);margin-top:5px;}
.lstat-trend{color:var(--c-green);}

.l-toolbar{display:flex;align-items:center;gap:14px;padding:12px 22px;background:#fff;border-left:0.5px solid var(--c-border);border-right:0.5px solid var(--c-border);border-top:0.5px solid var(--c-border);border-bottom:0.5px solid var(--c-border);flex-wrap:wrap;}
.l-tb-label{font-size:10px;color:var(--c-muted);text-transform:uppercase;letter-spacing:0.8px;font-weight:500;}
.l-tabs{display:flex;gap:4px;margin-left:auto;}
.l-tab{font-size:12px;padding:5px 12px;border-radius:6px;border:0.5px solid transparent;cursor:pointer;background:transparent;color:var(--c-muted);}
.l-tab.active{background:var(--c-blue-l);color:var(--c-blue);font-weight:500;}

.l-table-wrap{padding:14px 22px 18px;background:var(--c-soft2);border:0.5px solid var(--c-border);border-top:0;border-radius:0 0 14px 14px;}
.l-table{width:100%;border-collapse:collapse;background:#fff;border:0.5px solid var(--c-border);border-radius:10px;overflow:hidden;font-size:12px;}
.l-table thead{background:var(--c-soft);}
.l-table th{text-align:left;padding:9px 13px;font-size:10px;font-weight:500;color:var(--c-muted);text-transform:uppercase;letter-spacing:0.6px;border-bottom:0.5px solid var(--c-border);}
.l-table th.right{text-align:right;}
.l-table td{padding:10px 13px;border-bottom:0.5px solid #E3E8F0;vertical-align:middle;}
.l-table tr:last-child td{border-bottom:none;}
.l-table tbody tr{cursor:pointer;}
.l-table tbody tr:hover{background:#F8FAFD;}
.l-table td.right{text-align:right;}
.cust{display:flex;align-items:center;gap:8px;}
.cust-flag{display:inline-flex;align-items:center;justify-content:center;width:26px;height:18px;border-radius:3px;background:var(--c-soft);color:var(--c-blue-d);font-size:9.5px;font-weight:600;letter-spacing:0.5px;border:0.5px solid var(--c-border2);}
.cust-name{font-weight:500;font-size:12px;}
.cust-country{font-size:10px;color:var(--c-muted);}
.contract-type{display:inline-block;padding:2px 7px;border-radius:3px;font-size:9px;font-weight:500;letter-spacing:0.4px;}
.contract-care{background:var(--c-blue-l);color:var(--c-blue-d);}
.contract-sw{background:var(--c-purple-bg);color:#3C3489;}
.path-tag{display:inline-block;padding:3px 9px;border-radius:11px;font-size:9px;font-weight:500;letter-spacing:0.5px;}
.path-upsell{background:var(--c-gold-bg);color:var(--c-gold-t);}
.path-inflation{background:var(--c-teal-bg);color:var(--c-teal-t);}
.days{display:inline-block;padding:2px 7px;border-radius:3px;font-size:9px;font-weight:500;}
.days-urgent{background:var(--c-red-bg);color:var(--c-red);}
.days-soon{background:var(--c-gold-bg);color:var(--c-gold-t);}
.days-later{background:var(--c-green-bg);color:var(--c-green);}
.status{display:inline-flex;align-items:center;gap:5px;font-size:11px;color:var(--c-muted);}
.status-dot{width:6px;height:6px;border-radius:50%;}
.s-draft{background:var(--c-blue);}
.s-review{background:var(--c-gold);}
.s-sent{background:var(--c-green);}
.s-pending{background:var(--c-muted2);}

.l-tablefooter{padding:9px 13px;background:#F8FAFD;border-top:0.5px solid var(--c-border);font-size:11px;color:var(--c-muted);display:flex;justify-content:space-between;align-items:center;}

/* Detail page within ReNew */
.d-back{font-size:11px;color:var(--c-muted);cursor:pointer;display:inline-flex;align-items:center;gap:4px;margin-bottom:14px;}
.d-back:hover{color:var(--c-blue);}

.d-hero{padding:20px 22px;display:grid;grid-template-columns:auto 1fr auto;gap:22px;align-items:center;background:#fff;border:0.5px solid var(--c-border);border-radius:14px 14px 0 0;border-bottom:0;}
.d-flag{width:58px;height:58px;border-radius:12px;background:linear-gradient(135deg,#000 0%,#000 33%,#DD0000 33%,#DD0000 66%,#FFCC00 66%,#FFCC00 100%);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:600;font-size:15px;letter-spacing:1px;text-shadow:0 1px 2px rgba(0,0,0,0.5);}
.d-flag.fr{background:linear-gradient(90deg,#0055A4 0%,#0055A4 33%,#FFFFFF 33%,#FFFFFF 66%,#EF4135 66%,#EF4135 100%);color:#0055A4;text-shadow:0 0 2px rgba(255,255,255,0.95);}
.d-name{font-size:22px;font-weight:500;letter-spacing:-0.4px;margin:0 0 3px;}
.d-meta{font-size:12px;color:var(--c-muted);display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.d-chip{font-size:10px;padding:2px 8px;background:var(--c-gold-bg);color:var(--c-gold-t);border-radius:3px;font-weight:500;letter-spacing:0.3px;}
.d-stats{display:flex;gap:22px;align-items:center;}
.dstat-label{font-size:10px;color:var(--c-muted);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:2px;}
.dstat-val{font-size:18px;font-weight:500;letter-spacing:-0.3px;}
.dstat-sub{font-size:10px;color:var(--c-muted);}
.dstat-val.gold{color:var(--c-gold);}

.d-body{padding:16px;background:var(--c-soft2);border:0.5px solid var(--c-border);border-top:0;border-radius:0 0 14px 14px;}
.g3{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px;margin-bottom:12px;}
.g2b{display:grid;grid-template-columns:minmax(0,1.55fr) minmax(0,1fr);gap:12px;margin-bottom:12px;}
.card{background:#fff;border:0.5px solid var(--c-border);border-radius:10px;padding:13px 15px;}
.card-blue{border-top:2px solid var(--c-blue);}
.card-gold{border-top:2px solid var(--c-gold);}
.card-teal{border-top:2px solid var(--c-teal);}
.card-green{border-top:2px solid var(--c-green);}
.card-purple{border-top:2px solid var(--c-purple);}
.ctitle{font-size:9.5px;font-weight:500;color:var(--c-muted);text-transform:uppercase;letter-spacing:0.9px;margin-bottom:11px;display:flex;align-items:center;justify-content:space-between;gap:6px;}
.bg-tag{font-size:9px;padding:2px 6px;background:var(--c-blue-l);color:var(--c-blue);border-radius:3px;font-weight:500;letter-spacing:0.2px;text-transform:none;}
.bg-tag-gold{background:var(--c-gold-bg);color:var(--c-gold-t);}

.mrow{display:flex;align-items:baseline;justify-content:space-between;padding:6px 0;border-bottom:0.5px dashed #E3E8F0;}
.mrow:last-child{border:none;padding-bottom:0;}
.mrow:first-child{padding-top:0;}
.ml{font-size:11px;color:var(--c-muted);}
.mv{font-size:13px;font-weight:500;letter-spacing:-0.2px;}
.mv.urgent{color:var(--c-red);}
.ms{font-size:10px;color:var(--c-muted);}

.value-list{display:flex;flex-direction:column;gap:7px;}
.vl-item{display:flex;justify-content:space-between;align-items:center;padding:7px 10px;background:#F8FAFD;border-radius:6px;font-size:11.5px;}
.vl-text{color:var(--c-text);font-weight:500;}
.vl-num{font-size:13px;font-weight:500;color:var(--c-green);}

.upsell-list{display:flex;flex-direction:column;gap:8px;}
.upsell-item{padding:10px 12px;background:var(--c-gold-bg);border-left:3px solid var(--c-gold);border-radius:0 6px 6px 0;position:relative;transition:opacity 0.2s;}
.upsell-item.struck{background:var(--c-soft);border-left-color:var(--c-border2);opacity:0.55;}
.upsell-item.struck .upsell-name,.upsell-item.struck .upsell-up,.upsell-item.struck .upsell-desc{text-decoration:line-through;color:var(--c-muted) !important;}
.upsell-item.struck .upsell-tag{background:#E3E8F0 !important;color:var(--c-muted) !important;text-decoration:line-through;}
.upsell-rm{position:absolute;top:7px;right:7px;width:22px;height:22px;border-radius:50%;border:0.5px solid #D4B47A;background:#fff;color:var(--c-gold-t);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:13px;line-height:1;padding:0;}
.upsell-rm:hover{background:var(--c-gold-t);color:#fff;}
.upsell-item.struck .upsell-rm{border-color:var(--c-muted2);color:var(--c-green);font-size:14px;}
.upsell-item.struck .upsell-rm:hover{background:var(--c-green);color:#fff;}
.upsell-head{display:flex;justify-content:space-between;align-items:start;margin-bottom:4px;padding-right:30px;}
.upsell-name{font-size:12px;font-weight:500;color:var(--c-text);}
.upsell-up{font-size:13px;font-weight:500;color:var(--c-gold-t);}
.upsell-desc{font-size:10.5px;color:#5C4815;line-height:1.4;}
.upsell-tag{display:inline-block;font-size:8.5px;padding:1px 5px;background:#fff;color:var(--c-gold-t);border-radius:2px;margin-left:6px;font-weight:500;}

.vba-list{display:flex;flex-direction:column;gap:6px;}
.vba-item{display:grid;grid-template-columns:auto 1fr;gap:9px;padding:7px 10px;background:#F8FAFD;border-radius:6px;font-size:11px;align-items:start;}
.vba-icon{width:18px;height:18px;border-radius:50%;background:var(--c-blue);color:#fff;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:500;flex-shrink:0;}

.total-card{background:linear-gradient(135deg,var(--c-blue),var(--c-blue-d));color:#fff;border-radius:10px;padding:15px 17px;}
.total-label{font-size:10px;color:#A4BCE0;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:5px;}
.total-val{font-size:30px;font-weight:500;letter-spacing:-0.5px;line-height:1;}
.total-sub{font-size:11px;color:#A4BCE0;margin-top:7px;}

/* Inflation variant */
.infl-pricing{display:grid;grid-template-columns:1fr auto 1fr;gap:8px;align-items:center;text-align:center;margin-bottom:10px;}
.infl-pricing-item{padding:10px;background:#F8FAFD;border-radius:6px;}
.infl-pl{font-size:9.5px;color:var(--c-muted);text-transform:uppercase;letter-spacing:0.6px;margin-bottom:4px;}
.infl-pv{font-size:16px;font-weight:500;}
.infl-pv.teal{color:var(--c-teal-t);}
.infl-pv.green{color:var(--c-green);}
.infl-arrow{font-size:14px;color:var(--c-muted);}
.infl-bench{display:flex;flex-direction:column;gap:6px;}
.bench-item{display:flex;justify-content:space-between;padding:6px 10px;background:var(--c-teal-bg);border-radius:5px;font-size:11px;}
.bench-name{color:var(--c-teal-t);font-weight:500;}
.bench-val{color:var(--c-text);font-weight:500;}

.actions{display:flex;gap:8px;flex-wrap:wrap;}
.actions button{padding:7px 13px;font-size:12px;}

/* ───── Misc ───── */
.hidden{display:none !important;}
</style>
</head>

<div class="app">

  <!-- ───── SIDEBAR ───── -->
  <aside class="sidebar">
    <div class="sb-brand">

function escapeHtml(s){
  return s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]);
}

function initSage(){
  const body = document.getElementById('sageBody');
  const input = document.getElementById('sageInput');
  const send = document.getElementById('sageSend');
  const suggest = document.getElementById('sageSuggest');

  function autoGrow(){
    input.style.height = '40px';
    input.style.height = Math.min(input.scrollHeight, 120) + 'px';
  }
  input.addEventListener('input', autoGrow);

  function addUserMessage(text){
    const div = document.createElement('div');
    div.className = 'sage-msg-user';
    div.innerHTML = '<div class="bubble">' + escapeHtml(text) + '</div><div class="bubble-meta">just now</div>';
    body.appendChild(div);
    body.scrollTop = body.scrollHeight;
  }
  function addTyping(){
    const div = document.createElement('div');
    div.className = 'sage-msg-bot';
    div.id = 'sageTyping';
    div.innerHTML = `
      <div class="sage-msg-bot-head">
        <div class="sage-bot-av">S</div>
        <div class="sage-bot-name">SAGE</div>
        <span class="sage-bot-tag">SEARCHING CORPUS</span>
      </div>
      <div class="sage-typing"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>`;
    body.appendChild(div);
    body.scrollTop = body.scrollHeight;
  }
  function removeTyping(){ const t = document.getElementById('sageTyping'); if(t) t.remove(); }

  function addBotMessage(spec){
    const div = document.createElement('div');
    div.className = 'sage-msg-bot';
    const tag = (spec.citations && spec.citations.length)
      ? '<span class="sage-bot-tag">GROUNDED · ' + spec.citations.length + ' SOURCES</span>'
      : '<span class="sage-bot-tag warn">DEMO · NO MATCH</span>';
    let html = `
      <div class="sage-msg-bot-head">
        <div class="sage-bot-av">S</div>
        <div class="sage-bot-name">SAGE</div>
        ` + tag + `
      </div>
      <div class="sage-bot-card">
        <div class="sage-bot-text">` + spec.answer + `</div>`;
    if(spec.citations && spec.citations.length){
      html += '<div class="sage-citations"><div class="sage-cit-label">CITATIONS · CLICK TO OPEN SOURCE</div><div class="sage-cit-list">'
        + spec.citations.map(c => '<span class="sage-cit">' + c + '</span>').join('')
        + '</div></div>';
      html += '<div class="sage-bot-actions"><button>Generate briefing ↗</button><button>Copy snippet</button><button>Ask follow-up</button></div>';
    }
    if(spec.collateral){
      html += `<div class="sage-collateral">
        <div class="sage-coll-head">SALES-READY OUTPUT · ONE-PAGE BRIEF</div>
        <div class="sage-coll-title">` + spec.collateral.title + `</div>
        <div class="sage-coll-body">` + spec.collateral.body + `</div>
        <div class="sage-coll-foot">` + spec.collateral.foot + `</div>
      </div>`;
    }
    html += '</div>';
    div.innerHTML = html;
    body.appendChild(div);
    body.scrollTop = body.scrollHeight;
  }

  function ask(text){
    if(!text || !text.trim()) return;
    addUserMessage(text);
    input.value = '';
    autoGrow();
    addTyping();
    setTimeout(() => {
      removeTyping();
      const found = SAGE_ANSWERS.find(a => a.match.test(text));
      addBotMessage(found || SAGE_FALLBACK);
    }, 1200);
  }

  send.addEventListener('click', () => ask(input.value));
  input.addEventListener('keydown', e => {
    if(e.key === 'Enter' && !e.shiftKey){ e.preventDefault(); ask(input.value); }
  });
  suggest.querySelectorAll('.sage-sg-item').forEach(it => {
    it.addEventListener('click', () => ask(it.dataset.q));
  });
}

function runAssemblyLine(){
  const stops = document.querySelectorAll('#vbalStep5 .vbal-stop[data-step]');
  const arrows = document.querySelectorAll('#vbalStep5 .vbal-arrow');
  const fill = document.getElementById('vbalProgressFill');
  const lineStatus = document.getElementById('vbalLineStatus');
  const finalCard = document.getElementById('vbalFinal');
  const modeBadge = document.getElementById('vbalModeBadge');
  const toolSoCEl = document.getElementById('vbalToolSoC');

  const mode = window._vbalMode || 'large';
  if(mode === 'large'){
    modeBadge.textContent = 'Customised — Large customer';
    modeBadge.className = 'vbal-mode-badge vbal-mode-large';
    toolSoCEl.textContent = 'ISAAC-X · MI';
  } else {
    modeBadge.textContent = 'Automated — Pre-approved package';
    modeBadge.className = 'vbal-mode-badge vbal-mode-longtail';
    toolSoCEl.textContent = 'ISAAC-X · MI (auto)';
  }

  stops.forEach(s => { s.classList.remove('processing','done'); s.querySelector('[data-state]').textContent = 'queued'; });
  arrows.forEach(a => a.classList.remove('active','done'));
  document.querySelectorAll('#vbalOutputs .vbal-output-item').forEach(o => o.classList.remove('show'));
  fill.style.width = '0%';
  finalCard.classList.remove('show');

  const STEPS = 5;
  const TOTAL_MS = 30000;
  const PER_STEP = TOTAL_MS / STEPS;

  const messages = [
    'ISAAC-X drafting Statement of Compliance...',
    'InstaQuote generating Bill of Quantities...',
    'DocStar drafting Technical Solution Description...',
    'X-SU computing Service Costing...',
    'DocStar consolidating Executive Summary...'
  ];

  let i = 0;
  function processStep(){
    if(i >= STEPS){
      lineStatus.textContent = 'All artefacts ready · awaiting bid manager review';
      fill.style.width = '100%';
      setTimeout(() => finalCard.classList.add('show'), 400);
      return;
    }
    const stop = stops[i];
    const stateEl = stop.querySelector('[data-state]');
    stop.classList.add('processing');
    stateEl.innerHTML = '<div class="vbal-spinner"></div> processing';
    if(arrows[i]) arrows[i].classList.add('active');
    lineStatus.textContent = messages[i];

    setTimeout(() => {
      stop.classList.remove('processing');
      stop.classList.add('done');
      stateEl.innerHTML = '<span class="vbal-check">✓</span> done';
      if(arrows[i]){ arrows[i].classList.remove('active'); arrows[i].classList.add('done'); }
      const out = document.querySelector('#vbalOutputs .vbal-output-item[data-out="' + i + '"]');
      if(out) out.classList.add('show');
      fill.style.width = ((i + 1) / STEPS * 100) + '%';
      i++;
      processStep();
    }, PER_STEP);
  }
  setTimeout(processStep, 600);
}

        <td class="right"><button class="` + (idx === 0 ? 'primary' : '') + `">Open` + (idx === 0 ? ' ↗' : '') + `</button></td>
      `;
      tr.addEventListener('click', () => openRenewDetail(c));
      tbody.appendChild(tr);
    });
    document.getElementById('visibleCount').textContent = rows.length;
    document.getElementById('totalCount').textContent = RENEW_CUSTOMERS.length;
  }

  document.getElementById('renewRegion').addEventListener('change', e => { currentRegion = e.target.value; renderRows(); });
  document.getElementById('renewSort').addEventListener('change', e => { currentSort = e.target.value; renderRows(); });
  document.querySelectorAll('.l-tab').forEach(t => {
    t.addEventListener('click', () => {
      document.querySelectorAll('.l-tab').forEach(x => x.classList.remove('active'));
      t.classList.add('active');
      currentPath = t.dataset.path;
      renderRows();
    });
  });

  renderRows();
}

function openRenewDetail(c){
  const root = document.getElementById('renewRoot');
  root.innerHTML = '';
  const tplId = c.detail === 'upsell' ? 'tpl-renew-detail-upsell' : 'tpl-renew-detail-inflation';
  root.appendChild(document.getElementById(tplId).content.cloneNode(true));
  document.querySelector('.view').scrollTop = 0;

  document.getElementById('renewBack').addEventListener('click', renderRenewLanding);

  if(c.detail === 'upsell'){
    const list = document.getElementById('upsellList');
    const items = Array.from(list.querySelectorAll('.upsell-item'));
    const totalVal = document.getElementById('totalVal');
    const totalSub = document.getElementById('totalSub');
    const heroTotal = document.getElementById('heroTotal');
    const heroSub = document.getElementById('heroSub');
    const amounts = items.map(i => parseFloat(i.dataset.amount));
    const origCount = items.length;

    function fmt(k){ const m = k/1000; return m >= 1 ? '€' + m.toFixed(2) + 'M' : '€' + Math.round(k) + 'K'; }
    function recompute(){
      let sum = 0, count = 0;
      items.forEach((it, i) => { if(!it.classList.contains('struck')){ sum += amounts[i]; count++; } });
      if(count === 0){
        totalVal.textContent = '€0';
        totalSub.innerHTML = 'all opportunities removed · of €1.46M original';
        heroTotal.textContent = '€0';
        heroSub.textContent = 'all removed';
      } else if(count === origCount){
        totalVal.textContent = '+' + fmt(sum);
        totalSub.textContent = 'over 3 years · across 3 opportunities';
        heroTotal.textContent = fmt(sum);
        heroSub.textContent = 'across 3 opportunities';
      } else {
        totalVal.textContent = '+' + fmt(sum);
        totalSub.innerHTML = 'across ' + count + ' of ' + origCount + ' opportunities · of €1.46M original';
        heroTotal.textContent = fmt(sum);
        heroSub.textContent = 'across ' + count + ' of ' + origCount + ' opportunities';
      }
    }
    items.forEach(it => {
      const btn = it.querySelector('.upsell-rm');
      btn.addEventListener('click', e => {
        e.stopPropagation();
        const struck = it.classList.toggle('struck');
        btn.textContent = struck ? '↺' : '×';
        btn.title = struck ? 'Re-include in pitch' : 'Remove from pitch';
        recompute();
      });
    });
    recompute();
  }
}
</script>
